<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Controle - ESP32</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; }
        .container { border: 1px solid #ccc; padding: 20px; display: inline-block; border-radius: 8px; }
        input[type="number"] { padding: 8px; font-size: 16px; }
        button { padding: 8px 16px; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Controle do ESP32</h1>
        <p>Valor registrado atualmente no banco:</p>
        <h2 style="color: blue; font-size: 48px; margin: 10px 0;">{{ config.numero }}</h2>
        <p><small>Última atualização: {{ config.atualizado_em|date:"d/m/Y H:i:s" }}</small></p>

        <form method="POST">
            {% csrf_token %}
            <label for="numero">Atualizar Número:</label>
            <input type="number" id="numero" name="numero" required>
            <button type="submit">Salvar</button>
        </form>
    </div>
</body>
</html>
